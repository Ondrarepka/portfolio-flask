<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ondřej Řepka{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="nav">
  <a href="{{ url_for('home') }}" class="nav-logo">
    <div class="nav-logo-icon">OR</div>
    <span class="nav-logo-name">Ondřej Řepka</span>
  </a>
  <div class="nav-right">
    <a href="{{ url_for('home') }}" class="nav-link {{ 'active' if current == 'home' }}">Home</a>
    <a href="{{ url_for('portfolio') }}" class="nav-link {{ 'active' if current == 'portfolio' }}">Portfolio</a>
    <a href="{{ url_for('apps') }}" class="nav-link {{ 'active' if current == 'apps' }}">Apps & Tools</a>
    <a href="{{ url_for('blog') }}" class="nav-link {{ 'active' if current == 'blog' }}">Blog</a>
    <a href="{{ url_for('uses') }}" class="nav-link {{ 'active' if current == 'uses' }}">Uses</a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <span class="theme-knob">🌙</span>
    </button>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
